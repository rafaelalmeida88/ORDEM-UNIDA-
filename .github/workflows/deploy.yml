name: Deploy e Ativar Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publicar no gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          exclude_assets: '.github'

      - name: Ativar GitHub Pages via CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pages \
            --method POST \
            --field build_type=legacy \
            --field source[branch]=gh-pages \
            --field source[path]=/ \
            2>/dev/null || \
          gh api repos/${{ github.repository }}/pages \
            --method PUT \
            --field build_type=legacy \
            --field source[branch]=gh-pages \
            --field source[path]=/ \
            2>/dev/null || echo "Pages ja configurado"
          echo "Site: https://${{ github.repository_owner }}.github.io/$(basename ${{ github.repository }})/"
